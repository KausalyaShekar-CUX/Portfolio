<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Kausalya Shekar | Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
<style>
:root{--bg:#0b1220;--card:#111827;--text:#e5e7eb;--accent:#22c55e}
.light{--bg:#ffffff;--card:#f1f5f9;--text:#0f172a}
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif}
body{background:var(--bg);color:var(--text);scroll-behavior:smooth}
.nav{position:fixed;top:0;width:100%;display:flex;justify-content:center;gap:25px;padding:15px;background:rgba(0,0,0,0.6);backdrop-filter:blur(10px)}
.nav a{color:var(--text);text-decoration:none}
.toggle{position:fixed;right:20px;top:15px;cursor:pointer}
header{height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center}
h1{font-size:3rem}
.btn{margin-top:20px;padding:10px 20px;border:none;border-radius:20px;background:var(--accent);cursor:pointer}
section{padding:70px 20px;max-width:1100px;margin:auto}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px}
.card{background:var(--card);padding:20px;border-radius:15px;cursor:pointer}
.card:hover{transform:translateY(-5px)}
.modal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);justify-content:center;align-items:center}
.modal-content{background:var(--card);padding:30px;border-radius:15px;max-width:500px}
.chatbot{position:fixed;bottom:20px;right:20px;width:300px;background:var(--card);border-radius:15px;overflow:hidden}
.chat-header{background:var(--accent);padding:10px}
.chat-body{height:200px;overflow:auto;padding:10px}
.chat-input{display:flex}
.chat-input input{flex:1;padding:8px;border:none}
.chat-input button{padding:8px;border:none;background:var(--accent)}
</style>
</head>
<body>

<div class="nav">
<a href="#">Home</a>
<a href="#projects">Projects</a>
<a href="#contact">Contact</a>
</div>

<div class="toggle" onclick="toggleTheme()">🌙</div>

<header>
<h1>Kausalya Shekar</h1>
<p>Conversational AI | NLP | QA</p>
<button class="btn" onclick="window.open('#')">Download Resume</button>
</header>

<section id="projects">
<h2>Projects</h2>
<div class="cards">
<div class="card" onclick="openModal('Banking chatbot with NLP, APIs, and live agent fallback.')">🏦 Banking Chatbot</div>
<div class="card" onclick="openModal('Automated dental assistant improving response by 20%.')">🦷 Dental Bot</div>
<div class="card" onclick="openModal('Restaurant ordering bot with WhatsApp integration.')">🍽️ Restaurant Bot</div>
</div>
</section>

<div class="modal" id="modal">
<div class="modal-content">
<p id="modalText"></p>
<button onclick="closeModal()">Close</button>
</div>
</div>

<section id="contact">
<h2>Contact</h2>
<p>Email: kausalyashekar2607@gmail.com</p>
</section>

<!-- Chatbot -->
<div class="chatbot">
<div class="chat-header">Ask Me</div>
<div class="chat-body" id="chat"></div>
<div class="chat-input">
<input type="text" id="msg" placeholder="Ask about my work...">
<button onclick="sendMsg()">Send</button>
</div>
</div>

<script>
function toggleTheme(){document.body.classList.toggle('light')}

function openModal(text){
document.getElementById('modal').style.display='flex';
document.getElementById('modalText').innerText=text}
function closeModal(){document.getElementById('modal').style.display='none'}

function sendMsg(){
let input=document.getElementById('msg');
let chat=document.getElementById('chat');
let user=input.value;
chat.innerHTML+=`<p><b>You:</b> ${user}</p>`;
let reply='I am a Conversational AI & QA specialist with chatbot experience.';
if(user.toLowerCase().includes('project')) reply='I worked on banking, dental, and restaurant bots.';
chat.innerHTML+=`<p><b>Bot:</b> ${reply}</p>`;
input.value='';
}
</script>

</body>
</html>
